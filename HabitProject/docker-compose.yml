version: "3.9"

services:

  postgres:
    image: postgres:17-alpine
    container_name: habit-postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: habit-backend

    ports:
      - "8000:8000"

    depends_on:
      - postgres

  habittrackerwithredux:
    build: ./HabitTrackerWithRedux
    container_name: habit-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: